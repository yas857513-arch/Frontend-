<script>
    const API_BASE = "https://bagmi.onrender.com";
    let lastSent = 0;
    let timer = null;

    async function startTest() {
        const ip = document.getElementById('ip').value;
        const port = document.getElementById('port').value;
        const players = document.getElementById('players').value;
        const duration = document.getElementById('duration').value;

        if(!ip || !port || !players || !duration) return alert("All fields are required!");

        // UI Reset
        document.getElementById('statsPanel').classList.remove('hidden');
        document.getElementById('launchBtn').disabled = true;
        document.getElementById('launchBtn').innerText = "SYSTEM ACTIVE...";
        document.getElementById('statusBadge').innerText = "RUNNING";
        document.getElementById('statusBadge').className = "bg-green-900/50 text-green-400 text-[10px] px-2 py-1 rounded border border-green-500/50 animate-pulse";

        try {
            // Start the test
            await fetch(`${API_BASE}/start?ip=${ip}&port=${port}&players=${players}&duration=${duration}`);
            
            let startTime = Date.now();
            let totalSeconds = parseInt(duration);

            if(timer) clearInterval(timer);
            
            timer = setInterval(async () => {
                try {
                    const res = await fetch(`${API_BASE}/status`);
                    const data = await res.json();

                    const currentSent = data.sent;
                    const pps = (currentSent - lastSent);
                    
                    // Progress Calculation
                    let elapsed = (Date.now() - startTime) / 1000;
                    let progress = Math.min(100, (elapsed / totalSeconds) * 100);

                    // Update UI elements
                    document.getElementById('totalSent').innerText = currentSent.toLocaleString();
                    document.getElementById('pps').innerText = pps > 0 ? pps.toLocaleString() : "0";
                    document.getElementById('progressBar').style.width = progress + "%";
                    document.getElementById('progressText').innerText = Math.round(progress) + "%";
                    
                    lastSent = currentSent;

                    // Stop condition
                    if (data.status === 'finished' || progress >= 100) {
                        clearInterval(timer);
                        finishUI();
                    }
                } catch (e) {
                    console.log("Polling error...");
                }
            }, 1000);

        } catch (err) {
            alert("Connection to Backend Failed!");
            resetUI();
        }
    }

    function finishUI() {
        document.getElementById('statusBadge').innerText = "COMPLETED";
        document.getElementById('statusBadge').className = "bg-blue-900/50 text-blue-400 text-[10px] px-2 py-1 rounded border border-blue-500/50";
        document.getElementById('launchBtn').disabled = false;
        document.getElementById('launchBtn').innerText = "LAUNCH SEQUENCE";
        document.getElementById('progressBar').style.width = "100%";
        document.getElementById('progressText').innerText = "100%";
    }

    function resetUI() {
        document.getElementById('launchBtn').disabled = false;
        document.getElementById('launchBtn').innerText = "LAUNCH SEQUENCE";
    }
</script>
